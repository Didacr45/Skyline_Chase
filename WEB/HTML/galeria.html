<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyline Chase - Galería</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../CSS/stylesgaleria.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">SKYLINE<span>CHASE</span></div>

      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="controles.html">Sobre el juego</a></li>
          <li class="tiene-submenu">
            <a href="proyecto.html">Proyecto ▼</a>
            <ul class="submenu">
              <li><a href="diario-desarollo.html">DevBlog</a></li>
              <li><a href="galeria.html">Galeria</a></li>
            </ul>
          </li>
        </ul>
        <a
          href="https://github.com/Ruben1305/JuegoRecerca/blob/main/release.zip"
          download="SkylineChest.zip"
          class="btn-download"
        >
          Descargalo aquí
        </a>
      </div>
    </nav>

    <section id="galeria" class="section">
      <p class="section-tag">Capturas</p>
      <h2 class="section-title">Galería de Imágenes</h2>

      <div class="carousel-container">
        <button class="carousel-btn prev" id="prevBtn">&lt;</button>

        <div class="carousel-window">
          <div class="carousel-track" id="track">
            <img src="../IMG/decoration.png" alt="Decoracion del mapa" />
            <img src="../IMG/mage.png" alt="Enemigo Mago" />
            <img src="../IMG/map.png" alt="Parte de mapa" />
            <img src="../IMG/player.png" alt="Jugador" />
            <img src="../IMG/star.png" alt="Coleccionables" />
            <img src="../IMG/warrior.png" alt="Enemigo warrior" />
          </div>
        </div>

        <button class="carousel-btn next" id="nextBtn">&gt;</button>
      </div>
    </section>

    <div class="divider"></div>

    <footer>
      <p>
        Skyline Chase &mdash; Proyecto de Recerca &mdash; Desarrollado por
        <span class="footer-name">Didac Rubio y Rubén Alcantarilla</span>
      </p>
    </footer>

    <script src="../JS/carrusel.js"></script>

    <div class="cursor-personalizado"></div>
    <script>
    const cursor = document.querySelector('.cursor-personalizado');

    document.addEventListener('mousemove', (e) => {
      // clientX y clientY detectan la posición del ratón en la pantalla
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
  
  </body>
</html>
